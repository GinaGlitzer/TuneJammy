  <style>
      body {
        margin: 0;
        font-family: "Lato", sans-serif;
      }

      .sidebar {
        margin: 0;
        padding: 0;
        width: 200px;
        background-color: #ff8de1;
        position: fixed;
        height: 100%;
        overflow: auto;
      }

      .sidebar a {
        display: block;
        color: rgb(127, 3, 86);
        padding: 16px;
        text-decoration: none;
      }
      
      .sidebar a.active {
        background-color: #ff0894;
        color: white;
      }

      .sidebar a:hover:not(.active) {
        background-color: #fe7ac0;
        color: white;
      }

      div.content {
        margin-left: 200px;
        padding: 1px 16px;
        height: 1000px;
        background-color: #ffb8ec;
      }

      .image-container {
        width: 200px;
        height: 300px;
        border: 1px solid black;
      }

      .image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: 15% 100%;  
      }

      @media screen and (max-width: 700px) {
        .sidebar {
          width: 100%;
          height: auto;
          position: relative;
        }
        .sidebar a {float: left;}
        div.content {margin-left: 0;}
      }

      @media screen and (max-width: 400px) {
        .sidebar a {
          text-align: center;
          float: none;
        }
      }
  </style>
